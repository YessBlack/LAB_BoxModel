<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Card Profile</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,200..800;1,200..800&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <header class="header">
    <h1>Diseña tu Credencial</h1>
    <p>Diseñando el futuro de verificación digital</p>
  </header>

  <main class="card">
    <header class="headerCard">
      <img src="/images/default_profile.avif" alt="Profile Image" class="photoBox">
    </header>

    <article class="cardBody">

      <header class="cardHeader">
        <h1>Angelica Garcia</h1>
        <p>FULLSTACK DEVELOPER</p>
      </header>

      <section class="cardInfo">

        <div class="infoContainer">
          <i class="fa-solid fa-location-dot"></i>
          <div class="infoText">
            <span class="label">CIUDAD</span>
            <span class="value">Madrid, ES</span>
          </div>
        </div>

        <div class="infoContainer">
          <i class="fa-solid fa-envelope"></i>
          <div class="infoText">
            <span class="label">EMAIL</span>
            <span class="value">angelica@email.com</span>
          </div>
        </div>

        <div class="infoContainer">
          <i class="fa-solid fa-code"></i>
          <div class="infoText">
            <span class="label">TECNOLOGIAS</span>
            <span class="value">React</span>
          </div>
        </div>

        <div class="infoContainer">
          <i class="fa-solid fa-gamepad"></i>
          <div class="infoText">
            <span class="label">HOBBY</span>
            <span class="value">Videojuegos</span>
          </div>
        </div>

        <div class="infoContainer">
          <i class="fa-solid fa-cookie-bite"></i>
          <div class="infoText">
            <span class="label">GITHUB</span>
            <span class="value">@YessBlack</span>
          </div>
        </div>

      </section>

      <footer class="cardFooter">
        <p>Innovando un commit a la vez</p>
        <i class="fa-solid fa-quote-right"></i>
      </footer>

    </article>
  </main>
  <script src="./app.js"></script>
</body>

</html>
