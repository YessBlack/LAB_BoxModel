<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Card Profile</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,200..800;1,200..800&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <header class="header">
    <h1>DevGen — Credencial</h1>
    <p>Credencial de DevGen para Desarrolladores de Software</p>
  </header>

  <main>
    <article class="card">
      <div class="cardMedia">
        <img src="images/default_profile.avif" alt="Foto de perfil de Angelica Garcia" class="photoBox">
      </div>

      <section class="cardBody">
        <header class="cardIntro">
          <h2>Angelica Garcia</h2>
          <p>FULLSTACK DEVELOPER</p>
        </header>

        <div class="cardInfo">

          <div class="infoContainer">
            <i class="fa-solid fa-location-dot" aria-hidden="true"></i>
            <div class="infoText">
              <span class="label">CIUDAD</span>
              <span class="value">Madrid, ES</span>
            </div>
          </div>

          <div class="infoContainer">
            <i class="fa-solid fa-envelope" aria-hidden="true"></i>
            <div class="infoText">
              <span class="label">EMAIL</span>
              <span class="value">angelica@email.com</span>
            </div>
          </div>

          <div class="infoContainer">
            <i class="fa-solid fa-code" aria-hidden="true"></i>
            <div class="infoText">
              <span class="label">TECNOLOGIAS</span>
              <span class="value">React</span>
            </div>
          </div>

          <div class="infoContainer">
            <i class="fa-solid fa-gamepad" aria-hidden="true"></i>
            <div class="infoText">
              <span class="label">HOBBY</span>
              <span class="value">Videojuegos</span>
            </div>
          </div>

          <div class="infoContainer">
            <i class="fa-solid fa-cookie-bite" aria-hidden="true"></i>
            <div class="infoText">
              <span class="label">GITHUB</span>
              <span class="value">@YessBlack</span>
            </div>
          </div>

        </div>

        <footer class="cardFooter">
          <blockquote>
            <p>Innovando un commit a la vez</p>
          </blockquote>
          <i class="fa-solid fa-quote-right" aria-hidden="true"></i>
        </footer>
      </section>

    </article>
  </main>
  <script src="./app.js"></script>
</body>

</html>
